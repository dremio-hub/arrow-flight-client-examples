# Flight Client Configuration Properties
# This file contains default configuration values for the Flight client.
# Values can be overridden by environment variables (FLIGHT_*) or command line arguments.

# Connection settings
host=localhost
port=32010

# Authentication (leave empty to use command line or environment variables)
user=
pass=
pat=

# Query settings
query=
binpath=

# TLS settings
tls=false
dsv=false
keystorepath=
keystorepass=

# Demo mode
demo=false

# Engine and project settings
engine=
projectid=

# Verbose output
verbose=false
